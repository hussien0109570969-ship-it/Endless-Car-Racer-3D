name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Extract ZIP
      run: |
        mkdir game_folder
        unzip -q endless-car-racer-android.zip -d game_folder

    - name: Build and Assemble
      run: |
        cd game_folder
        # الانتقال لمجلد المشروع
        cd $(find . -maxdepth 2 -name "gradlew" -exec dirname {} \;)
        chmod +x gradlew
        # بناء المكتبات أولاً ثم التطبيق لتجنب خطأ No variants exist
        ./gradlew :capacitor-android:assembleDebug :app:assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: EndlessCarRacer-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
